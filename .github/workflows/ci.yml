name: CI/CD (Professional)

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  check:
    name: Lint and Build Check
    runs-on: ubuntu-latest
    timeout-minutes: 15

    # Ephemeral Database (ビルド・テスト用の一時的なDB)
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: test_user
          POSTGRES_PASSWORD: test_password
          POSTGRES_DB: template_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint check
        run: pnpm run lint

      # データベースの初期化とビルド検証
      - name: Database & Build Check
        run: |
          if [ -f "prisma/schema.prisma" ]; then
            pnpm prisma generate
            pnpm prisma db push --accept-data-loss
          fi
          # build スクリプトがある場合のみ実行
          if npm run | grep -q "build"; then
            pnpm run build
          else
            echo "No build script found, skipping build check."
          fi
        env:
          DATABASE_URL: postgresql://test_user:test_password@localhost:5432/template_test
          DIRECT_URL: postgresql://test_user:test_password@localhost:5432/template_test
          AUTH_SECRET: CI_AUTH_SECRET_PLACEHOLDER
          # 認証等のダミー環境変数
          AUTH_GITHUB_ID: dummy
          AUTH_GITHUB_SECRET: dummy
          ADMIN_EMAIL: admin@example.com
