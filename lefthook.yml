pre-commit:
  parallel: true
  commands:
    linter:
      glob: "*.{js,ts,tsx,go,json,md}"
      run: pnpm run lint
    formatter:
      glob: "*.{js,ts,tsx,json,md}"
      run: pnpm dlx prettier --write {staged_files} && git add {staged_files}

commit-msg:
  commands:
    commitlint:
      run: npx commitlint --edit {1}
